{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-md-8">
            <img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=1200" class="img-fluid rounded-4 mb-4">
            <h1 class="fw-bold">{{ hotel.name }}</h1>
            <p class="text-muted"><i class="fas fa-map-marker-alt"></i> {{ hotel.city }}, India</p>
            <p class="lead">{{ hotel.description }}</p>
        </div>
        <div class="col-md-4">
            <div class="card p-4 shadow-sm border-0 rounded-4 sticky-top" style="top: 20px;">
                <h3 class="fw-bold text-danger">₹{{ hotel.price }} <small class="text-muted fs-6">/ night</small></h3>
                <hr>
                <form action="/book/{{ hotel.id }}" method="POST">
                    <div class="mb-3">
                        <label class="small fw-bold">Check-in</label>
                        <input type="date" name="checkin" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold">Check-out</label>
                        <input type="date" name="checkout" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg">Book Now</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
