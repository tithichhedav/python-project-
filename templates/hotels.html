{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <h2 class="fw-bold mb-4">Stays in {{ request.args.get('city', 'India') }}</h2>
    <div class="row g-4">
        {% for hotel in hotels %}
        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden">
               <img src="https://picsum.photos/seed/{{ hotel.id }}/600/400" class="card-img-top" alt="{{ hotel.name }}">
                <div class="card-body">
                    <h5 class="fw-bold mb-1">{{ hotel.name }}</h5>
                    <p class="text-muted small mb-2">{{ hotel.city }}</p>
                    <h5 class="text-danger fw-bold">₹{{ hotel.price }} <small class="text-muted fw-light">/night</small></h5>
                    <a href="/hotel/{{ hotel.id }}" class="btn btn-outline-dark w-100 mt-2">View Details</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
