{% extends "base.html" %}
{% block content %}
<div class="container py-5" style="margin-top: 80px;">
    <h2 class="fw-bold mb-4">Your Bookings, {{ session['user_name'] }}</h2>
    <div class="row">
        <div class="col-md-8">
            {% for b in bookings %}
            <div class="card mb-3 border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="row g-0">
                    <div class="col-3"><img src="https://picsum.photos/seed/{{ b.hotel.id + 10 }}/200/200" class="img-fluid h-100" style="object-fit:cover;"></div>
                    <div class="col-9 p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div><h5 class="fw-bold mb-1">{{ b.hotel.name }}</h5><p class="text-muted small mb-0">{{ b.checkin }} to {{ b.checkout }}</p></div>
                            <span class="badge bg-success-subtle text-success p-2">Confirmed</span>
                        </div>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="text-center p-5 bg-white rounded-4 shadow-sm"><p>No bookings found.</p><a href="/" class="btn btn-primary btn-sm">Find a Hotel</a></div>
            {% endfor %}
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    {% with messages = get_flashed_messages() %}{% if 'BOOKING_CONFIRMED' in messages %}
    Swal.fire({ title: 'Success!', text: 'Your stay is booked.', icon: 'success', confirmButtonColor: '#ff5a5f' });
    {% endif %}{% endwith %}
</script>
{% endblock %}
